<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Push - Login</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .login-page {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(430px, 100%);
        background:
          linear-gradient(180deg, #fafafb, #f2f3f5),
          repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.03) 0 1px, transparent 1px 6px);
        border: 1px solid #dadddf;
        border-radius: 28px;
        box-shadow: 0 12px 24px rgba(20, 24, 32, 0.09);
        padding: 28px;
        animation: loginIn 0.45s var(--ease-smooth) forwards;
        transform: translateY(12px);
        opacity: 0;
        position: relative;
        overflow: hidden;
      }

      .login-card::before {
        content: "";
        position: absolute;
        width: 180px;
        height: 180px;
        right: -50px;
        top: -60px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(120, 142, 255, 0.24), transparent 68%);
        pointer-events: none;
      }

      .login-card::after {
        content: "";
        position: absolute;
        width: 170px;
        height: 170px;
        left: -56px;
        bottom: -70px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(147, 235, 55, 0.25), transparent 66%);
        pointer-events: none;
      }

      .login-title {
        margin: 0 0 6px;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: 52px;
        line-height: 0.95;
        color: #1f2329;
        position: relative;
        z-index: 1;
      }

      .login-subtitle {
        margin: 0 0 24px;
        color: #7f8792;
        font-size: 20px;
        position: relative;
        z-index: 1;
      }

      .login-form {
        display: grid;
        gap: 14px;
        position: relative;
        z-index: 1;
      }

      .login-label {
        display: block;
        margin-bottom: 6px;
        font-size: 15px;
        color: #6f7783;
      }

      .login-input {
        width: 100%;
        border: 1px solid #d3d7df;
        border-radius: 12px;
        padding: 12px 14px;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: 18px;
        background: #f7f8f9;
        color: #23262d;
      }

      .login-input:focus {
        outline: none;
        border-color: #8aa0ff;
        box-shadow: 0 0 0 3px rgba(100, 126, 255, 0.16);
      }

      .login-btn {
        margin-top: 6px;
        border: 1px solid #d3d7df;
        border-radius: 14px;
        background:
          linear-gradient(180deg, #fafbfc, #f1f2f4),
          repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.07) 0 1px, transparent 1px 6px);
        color: #23262d;
        cursor: pointer;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: 22px;
        font-weight: 700;
        padding: 12px 14px;
        transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s var(--ease-smooth);
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 18px rgba(22, 26, 33, 0.13);
      }

      @keyframes loginIn {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="login-page">
    <main class="login-card">
      <h1 class="login-title">PUSH</h1>
      <p class="login-subtitle">Merchant sign in</p>
      <form class="login-form" id="loginForm" action="./index.html" novalidate>
        <div>
          <label class="login-label" for="login-email">Email</label>
          <input class="login-input" id="login-email" type="email" name="email" autocomplete="email" />
        </div>
        <div>
          <label class="login-label" for="login-password">Password</label>
          <input class="login-input" id="login-password" type="password" name="password" autocomplete="current-password" />
        </div>
        <button class="login-btn" type="submit">Log in</button>
      </form>
    </main>
    <script>
      if (localStorage.getItem("merchant_dashboard_logged_in") === "1") {
        window.location.replace("./index.html");
      }

      document.getElementById("loginForm").addEventListener("submit", function (event) {
        event.preventDefault();
        localStorage.setItem("merchant_dashboard_logged_in", "1");
        window.location.replace("./index.html");
      });
    </script>
  </body>
</html>
