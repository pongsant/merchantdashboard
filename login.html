<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Push - Login</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 78% 14%, rgba(255, 255, 255, 0.88), transparent 22%),
          radial-gradient(circle at 16% 16%, rgba(226, 229, 234, 0.86), transparent 24%),
          linear-gradient(180deg, #efefec 0%, #e9e8e5 100%);
      }

      .auth-card {
        width: min(1320px, 100%);
        max-width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1.18fr) minmax(460px, 0.92fr);
        gap: clamp(24px, 2.8vw, 48px);
        border-radius: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
        padding: 0;
        animation: authFadeIn 0.44s var(--ease-smooth) forwards;
        transform: translateY(10px);
        opacity: 0;
        overflow: hidden;
        position: relative;
      }

      .auth-card::before {
        content: "push";
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: -18px;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: clamp(64px, 16vw, 220px);
        line-height: 0.88;
        letter-spacing: -0.1em;
        font-weight: 700;
        color: rgba(17, 18, 22, 0.06);
        pointer-events: none;
      }

      .auth-brand {
        position: relative;
        padding: 34px 34px 38px;
        border-right: 0;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .auth-brand-copy {
        max-width: 34ch;
      }

      .auth-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: linear-gradient(180deg, #1d2027, #0d0f14);
        color: #f7f9ff;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-weight: 400;
        font-size: 24px;
        margin-bottom: 18px;
        box-shadow: 0 10px 24px rgba(17, 18, 22, 0.18);
      }

      .auth-title {
        margin: 0;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: clamp(58px, 10vw, 148px);
        line-height: 0.88;
        letter-spacing: -0.08em;
        font-weight: 700;
        color: #1f2329;
        overflow-wrap: anywhere;
      }

      .auth-subtitle {
        margin: 12px 0 0;
        color: #6e7682;
        font-size: clamp(18px, 2.4vw, 26px);
        font-weight: 300;
        line-height: 1.26;
      }

      .auth-brand-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .auth-brand-meta span {
        padding-top: 12px;
        border-top: 0;
        color: rgba(17, 19, 24, 0.56);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .auth-form-shell {
        position: relative;
        padding: 34px 34px 28px;
        width: min(100%, 600px);
        justify-self: end;
      }

      .auth-kicker {
        margin: 0 0 14px;
        color: rgba(17, 19, 24, 0.54);
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .auth-form {
        display: grid;
        gap: 14px;
      }

      .auth-label {
        display: block;
        margin-bottom: 6px;
        color: #626b78;
        font-size: 18px;
        font-weight: 400;
      }

      .auth-input {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 16px 18px;
        background: rgba(255, 255, 255, 0.82);
        color: #1f2329;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: clamp(20px, 4vw, 24px);
        font-weight: 400;
        box-shadow: inset 0 0 0 1px rgba(17, 19, 24, 0.08);
      }

      .auth-input:focus {
        outline: none;
        border-color: #9daeff;
        box-shadow: 0 0 0 3px rgba(126, 149, 255, 0.15);
      }

      .auth-submit {
        margin-top: 4px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #11141b;
        cursor: pointer;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: clamp(22px, 5vw, 28px);
        font-weight: 400;
        padding: 14px 18px;
        transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s var(--ease-smooth);
        box-shadow: inset 0 0 0 1px rgba(17, 19, 24, 0.12);
      }

      .auth-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(18, 24, 36, 0.08);
      }

      .auth-footer {
        margin-top: 14px;
        text-align: center;
      }

      .auth-link {
        border: 0;
        background: transparent;
        color: #646d79;
        font-family: "Darky", "Darker Grotesque", sans-serif;
        font-size: 17px;
        font-weight: 400;
        text-decoration: underline;
        cursor: pointer;
      }

      .auth-link:hover {
        color: #1f2329;
      }

      @media (max-width: 1024px) {
        .auth-card {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .auth-brand,
        .auth-form-shell {
          width: 100%;
          justify-self: stretch;
        }
      }

      @media (max-width: 520px) {
        .auth-page {
          padding: 14px;
        }

        .auth-brand,
        .auth-form-shell {
          padding: 22px 16px 20px;
        }
      }

      @keyframes authFadeIn {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <section class="auth-brand">
        <div class="auth-brand-copy">
          <div class="auth-logo" aria-hidden="true">P</div>
          <h1 class="auth-title">Push</h1>
          <p class="auth-subtitle">Graphic realism minimal merchant control with a cleaner editorial layout.</p>
        </div>
        <div class="auth-brand-meta">
          <span>Campaigns</span>
          <span>Analytics</span>
          <span>Payments</span>
        </div>
      </section>
      <section class="auth-form-shell">
        <p class="auth-kicker">Merchant login</p>
        <form class="auth-form" id="loginForm" action="./index.html" novalidate>
          <div>
            <label class="auth-label" for="login-username">Username</label>
            <input class="auth-input" id="login-username" type="text" name="username" autocomplete="username" />
          </div>
          <div>
            <label class="auth-label" for="login-password">Password</label>
            <input class="auth-input" id="login-password" type="password" name="password" autocomplete="current-password" />
          </div>
          <button class="auth-submit" id="loginSubmit" type="submit">Log in</button>
        </form>

        <div class="auth-footer">
          <button class="auth-link" id="goCreateAccount" type="button">Create account</button>
        </div>
      </section>
    </main>

    <script>
      try {
        sessionStorage.removeItem("push_dashboard_authed");
        sessionStorage.removeItem("merchant_dashboard_logged_in");
      } catch (_error) {
        // noop
      }

      const loginForm = document.getElementById("loginForm");
      const loginSubmit = document.getElementById("loginSubmit");
      const goCreateAccount = document.getElementById("goCreateAccount");

      function loginNow(event) {
        event?.preventDefault?.();
        try {
          sessionStorage.setItem("push_dashboard_authed", "true");
          sessionStorage.setItem("merchant_dashboard_logged_in", "1");
        } catch (_error) {
          // noop
        }
        window.location.href = "./index.html";
      }

      loginForm?.addEventListener("submit", loginNow);
      loginSubmit?.addEventListener("click", loginNow);

      goCreateAccount?.addEventListener("click", () => {
        window.location.href = "./create-account.html";
      });
    </script>
  </body>
</html>
