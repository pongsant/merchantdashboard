<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Push Merchant Dashboard Prototype</title>
    <script>
      if (sessionStorage.getItem("merchant_dashboard_logged_in") !== "1") {
        window.location.replace("./login.html");
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mark">P</div>
          <div>
            <p class="logo-label">Push</p>
            <p class="logo-sub">Merchant OS</p>
          </div>
        </div>
        <section class="theme-switcher-wrap">
          <p class="micro-label">Category Themes</p>
          <div class="theme-switcher" id="themeSwitcher"></div>
          <p class="theme-note" id="themeNote"></p>
        </section>
        <nav class="nav" id="sidebarNav" aria-label="Primary navigation"></nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <button class="icon-btn" id="menuToggle" aria-label="Open menu">
            <span></span><span></span><span></span>
          </button>
          <div class="top-title-wrap">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Real-time merchant intelligence</p>
            <p class="viewing-indicator" id="viewingIndicator"></p>
          </div>
          <div class="top-actions">
            <div class="top-filters" id="topFilters"></div>
            <button class="icon-chip" id="accountBtn" aria-label="Account">
              <svg class="chip-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="3.2"></circle>
                <path d="M5 18c1-3 3.8-4.8 7-4.8s6 1.8 7 4.8"></path>
              </svg>
              <span>Account</span>
            </button>
            <button class="icon-chip" id="settingBtn" aria-label="Settings">
              <svg class="chip-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3.1"></circle>
                <path d="M19.2 14.9a1 1 0 0 0 .2 1.1l.1.1a1 1 0 0 1 0 1.4l-1 1a1 1 0 0 1-1.4 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V19a1 1 0 0 1-1 1h-1.6a1 1 0 0 1-1-1v-.1a1 1 0 0 0-.7-.9 1 1 0 0 0-1 .2l-.1.1a1 1 0 0 1-1.4 0l-1-1a1 1 0 0 1 0-1.4l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H5a1 1 0 0 1-1-1v-1.6a1 1 0 0 1 1-1h.1a1 1 0 0 0 .9-.7 1 1 0 0 0-.2-1l-.1-.1a1 1 0 0 1 0-1.4l1-1a1 1 0 0 1 1.4 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V5a1 1 0 0 1 1-1h1.6a1 1 0 0 1 1 1v.1a1 1 0 0 0 .7.9 1 1 0 0 0 1-.2l.1-.1a1 1 0 0 1 1.4 0l1 1a1 1 0 0 1 0 1.4l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H19a1 1 0 0 1 1 1v1.6a1 1 0 0 1-1 1h-.1a1 1 0 0 0-.9.7z"></path>
              </svg>
              <span>Settings</span>
            </button>
          </div>
        </header>

        <section id="pageContainer" class="page-container"></section>
      </main>
    </div>

    <div class="mobile-drawer-backdrop" id="mobileBackdrop"></div>
    <nav class="mobile-drawer" id="mobileDrawer" aria-label="Main navigation">
      <div class="mobile-head">
        <div class="sidebar-logo">
          <div class="logo-mark">P</div>
          <div>
            <p class="logo-label">Push</p>
            <p class="logo-sub">Merchant OS</p>
          </div>
        </div>
        <button class="icon-btn close" id="closeDrawer" aria-label="Close menu">
          ✕
        </button>
      </div>
      <div id="mobileNav"></div>
    </nav>

    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" aria-label="Close details">✕</button>
        <p class="modal-kicker" id="modalKicker"></p>
        <h2 id="modalTitle">Details</h2>
        <div id="modalBody"></div>
        <div class="modal-actions">
          <button class="btn ghost" id="modalDismiss">Close</button>
          <button class="btn primary" id="openFullDetail">Open full page</button>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
